version: '3.8'

services:
  efficient-ai:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Generated wallet for x402 payments on Base network
      - EFFICIENT_WALLET=0x4c368865fb3a0553F782beb3e772a22bca988b22
      - EFFICIENT_NETWORK=${EFFICIENT_NETWORK:-eip155:8453}
      - EFFICIENT_FACILITATOR_URL=${EFFICIENT_FACILITATOR_URL:-https://x402.org/facilitator}
      # Optional: Cloud API keys for fallback
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
